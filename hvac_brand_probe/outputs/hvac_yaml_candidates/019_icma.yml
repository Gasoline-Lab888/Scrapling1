brand: icma
brand_name: "ICMA S.p.A."
website: "https://www.icmaspa.it/"
entry_url: "https://www.icmaspa.it/products-catalogue/?lang=en"
seed_urls:
  - "https://www.icmaspa.it/products-catalogue/?lang=en"
max_pages: 250

url_scope:
  path_prefix: null

page_role_classification:
  category:
    indicators:
      - "/product"
    recurse: true
  product:
    indicators:
      - "/product/"
    recurse: false
  navigation:
    indicators:
      - "/download"
    recurse: true

fields:
  product_name: "h1"
  downloads: "a[href$='.pdf']"

filters:
  download_link_selector: "a[href$='.pdf']"
  reject_url_patterns:
    - "/news/"
    - "/blog/"
    - "/events/"
    - "/careers/"
    - "/privacy/"
    - "/terms/"
    - "/cookie/"
    - "/contact/"
    - "/about/"
  global_download_threshold: 10

probe_notes:
  verification_status: "not_verified_by_browser"
  suggested_category: "D-黄铜阀门/管件/分集水器/通用水暖"
  suggested_priority: "P1"
  manual_review: "站点使用 lang=en 参数，需在爬虫中保留语言参数。；preserve lang=en query parameter"
  crawl_scope_notes: "爬 products-catalogue 和 downloads，重点 heating components、manifolds、mixing units、thermostatic valves、fittings。
"
  product_line_notes: "采暖技术阀件、分集水器、管件、混水和系统组件。"
