brand: officine_rigamonti_or
brand_name: "Officine Rigamonti / OR"
website: "https://www.officinerigamonti.it/"
entry_url: "https://www.officinerigamonti.it/en/"
seed_urls:
  - "https://www.officinerigamonti.it/en/"
max_pages: 250

url_scope:
  path_prefix: "/en/"

page_role_classification:
  category:
    indicators:
      - "/product"
    recurse: true
  product:
    indicators:
      - "/product/"
    recurse: false
  navigation:
    indicators:
      - "/download"
    recurse: true

fields:
  product_name: "h1"
  downloads: "a[href$='.pdf']"

filters:
  download_link_selector: "a[href$='.pdf']"
  reject_url_patterns:
    - "/news/"
    - "/blog/"
    - "/events/"
    - "/careers/"
    - "/privacy/"
    - "/terms/"
    - "/cookie/"
    - "/contact/"
    - "/about/"
  global_download_threshold: 10

probe_notes:
  verification_status: "not_verified_by_browser"
  suggested_category: "D-黄铜阀门/管件/分集水器/通用水暖"
  suggested_priority: "P1"
  manual_review: "官网内下载页/PDF 入口需人工复核，避免混入代理商目录。"
  crawl_scope_notes: "爬英文 products，重点 valves、pressure reducing/safety、brass plumbing components；PDF 可能通过 catalogue 或产品页链接。
"
  product_line_notes: "黄铜阀门、水暖控制和通用阀件，适合作为阀门结构与目录参考。"
