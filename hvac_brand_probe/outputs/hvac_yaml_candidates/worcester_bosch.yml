brand: worcester_bosch
brand_name: Worcester Bosch
website: https://www.worcester-bosch.co.uk/
entry_url: https://www.worcester-bosch.co.uk/
seed_urls:
- https://www.worcester-bosch.co.uk/
max_pages: 200
url_scope:
  path_prefix: ''
  same_registered_domain: true
page_role_classification:
  homepage:
  - ^/?$
  - ^/(en|en-us|en-gb)/?$
  product:
  - /product
  - /products
  - /range
  - /solutions
  download:
  - /download
  - /downloads
  - /document
  - /documents
  - /documentation
  - /catalog
  - /catalogue
  - /brochure
  - /datasheet
  - /manual
  - /literature
  - /technical-document
  - /product-documentation
  - /certificate
fields:
  title:
    selector: h1
    type: text
  description:
    selector: meta[name=description]
    type: attr
    attr: content
filters:
  language: en
  min_pdf_size_kb: 30
  max_pdf_size_mb: 60
reject_url_patterns:
- /(de|fr|it|es|pt|nl|pl|ru|zh|jp|ja|ko|tr|ar)(/|$)
- /news/
- /blog/
- /press/
- /career
- /jobs
- /legal/
- /privacy
- /cookie
- /contact
- \?lang=(?!en)
download_link_selector: a[href$='.pdf'], a[href*='/download'], a[href*='/documents/'],
  a[href*='/datasheet']
global_download_threshold: 500
probe_metadata:
  homepage_status: 403
  homepage_ok: false
  needs_js_render: false
  js_render_evidence: ''
  needs_login: false
  blocked_reason: sandbox_egress_block
  english_detection: ''
  fetcher_used: scrapling.Fetcher
  worth_promoting: false
  worth_promoting_reason: homepage_not_ok(status=403),no_english_version,no_download_or_pdf_links,blocked:sandbox_egress_block
  pdf_example_count: 0
  download_link_count: 0
  product_link_count: 0
pdf_examples: []
