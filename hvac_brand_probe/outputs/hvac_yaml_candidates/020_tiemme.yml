brand: tiemme
brand_name: "Tiemme"
website: "https://www.tiemme.com/"
entry_url: "https://www.tiemme.com/"
seed_urls:
  - "https://www.tiemme.com/"
max_pages: 250

url_scope:
  path_prefix: null

page_role_classification:
  category:
    indicators:
      - "/product"
    recurse: true
  product:
    indicators:
      - "/product/"
    recurse: false
  navigation:
    indicators:
      - "/download"
    recurse: true

fields:
  product_name: "h1"
  downloads: "a[href$='.pdf']"

filters:
  download_link_selector: "a[href$='.pdf']"
  reject_url_patterns:
    - "/news/"
    - "/blog/"
    - "/events/"
    - "/careers/"
    - "/privacy/"
    - "/terms/"
    - "/cookie/"
    - "/contact/"
    - "/about/"
  global_download_threshold: 10

probe_notes:
  verification_status: "not_verified_by_browser"
  suggested_category: "D-黄铜阀门/管件/分集水器/通用水暖"
  suggested_priority: "P1"
  manual_review: "需人工确认稳定英文入口，可能是移动英文站或语言切换后的路径。"
  crawl_scope_notes: "爬产品目录中 manifolds、valves、fittings、PEX/multilayer、heating components；Chrome 搜索可补 m.tiemme.com/eng 产品页。
"
  product_line_notes: "管件、阀门、分集水器、采暖系统和多层管系统。"
