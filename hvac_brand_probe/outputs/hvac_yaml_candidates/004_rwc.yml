brand: rwc
brand_name: "RWC"
website: "https://www.rwc.com/"
entry_url: "https://www.rwc.com/brands"
seed_urls:
  - "https://www.rwc.com/brands"
max_pages: 250

url_scope:
  path_prefix: null

page_role_classification:
  category:
    indicators:
      - "/product"
    recurse: true
  product:
    indicators:
      - "/product/"
    recurse: false
  navigation:
    indicators:
      - "/download"
    recurse: true

fields:
  product_name: "h1"
  downloads: "a[href$='.pdf']"

filters:
  download_link_selector: "a[href$='.pdf']"
  reject_url_patterns:
    - "/news/"
    - "/blog/"
    - "/events/"
    - "/careers/"
    - "/privacy/"
    - "/terms/"
    - "/cookie/"
    - "/contact/"
    - "/about/"
  global_download_threshold: 10

probe_notes:
  verification_status: "not_verified_by_browser"
  suggested_category: "H-集团/母公司/多品牌平台"
  suggested_priority: "P1"
  manual_review: "确认后续是否只保留 RWC 作为索引页，实际 YAML 按子品牌生成。"
  crawl_scope_notes: "不建议只爬母公司首页；应拆 SharkBite、JG Speedfit、John Guest、Reliance Valves、HoldRite 等品牌后分别爬。
"
  product_line_notes: "多品牌集团入口，覆盖 push-fit、PEX、管件、阀门、支架与水暖系统。"
