brand: imi
brand_name: "IMI Climate Control / IMI Hydronic Engineering"
website: "https://climatecontrol.imiplc.com/"
entry_url: "https://climatecontrol.imiplc.com/product-finder"
seed_urls:
  - "https://climatecontrol.imiplc.com/product-finder"
max_pages: 250

url_scope:
  path_prefix: null

page_role_classification:
  category:
    indicators:
      - "/product"
    recurse: true
  product:
    indicators:
      - "/product/"
    recurse: false
  navigation:
    indicators:
      - "/download"
    recurse: true

fields:
  product_name: "h1"
  downloads: "a[href$='.pdf']"

filters:
  download_link_selector: "a[href$='.pdf']"
  reject_url_patterns:
    - "/news/"
    - "/blog/"
    - "/events/"
    - "/careers/"
    - "/privacy/"
    - "/terms/"
    - "/cookie/"
    - "/contact/"
    - "/about/"
  global_download_threshold: 10

probe_notes:
  verification_status: "not_verified_by_browser"
  suggested_category: "C-商用 HVAC/水力平衡/控制阀"
  suggested_priority: "P0"
  manual_review: "需在后续 YAML 阶段拆 TA、Heimeier、Pneumatex 等子品牌/产品线。"
  crawl_scope_notes: "优先从 Product Finder、Solutions、Brands/TA/Heimeier/Pneumatex 等产品入口进入；后续重点识别 balancing/control valves、thermostatic valves、pressurisation、technical PDF。
"
  product_line_notes: "商用水力平衡、控制阀、压差控制、恒温阀、执行器和系统控制，是 hydronic control 标杆站。"
