brand: rbm
brand_name: "RBM"
website: "https://rbm.eu/"
entry_url: "https://rbm.eu/en/products"
seed_urls:
  - "https://rbm.eu/en/products"
max_pages: 250

url_scope:
  path_prefix: "/en/"

page_role_classification:
  category:
    indicators:
      - "/product"
    recurse: true
  product:
    indicators:
      - "/product/"
    recurse: false
  navigation:
    indicators:
      - "/download"
    recurse: true

fields:
  product_name: "h1"
  downloads: "a[href$='.pdf']"

filters:
  download_link_selector: "a[href$='.pdf']"
  reject_url_patterns:
    - "/news/"
    - "/blog/"
    - "/events/"
    - "/careers/"
    - "/privacy/"
    - "/terms/"
    - "/cookie/"
    - "/contact/"
    - "/about/"
  global_download_threshold: 10

probe_notes:
  verification_status: "not_verified_by_browser"
  suggested_category: "D-黄铜阀门/管件/分集水器/通用水暖"
  suggested_priority: "P1"
  manual_review: "RBM 也有磁过滤/系统保护，YAML 阶段需优先采暖阀门和分集水器。"
  crawl_scope_notes: "爬 products 和 download/catalogue，重点 hydronic products、balancing、manifolds、radiant panels、brass fittings、magnetic filters 可后置。
"
  product_line_notes: "水暖阀件、平衡组件、分集水器、管件和系统附件。"
