# 30 selected HVAC / hydronics / underfloor heating / valve brands for probe.
#
# Each entry is metadata only - the probe script will visit `website`, try to
# locate an English version, and infer entry_url, seed_urls, product/download
# pages, and PDF links.
#
# Categories:
#   hvac          - air-conditioning / heat pump / chillers / unitary / VRF
#   boiler        - residential / commercial boilers, water heaters
#   hydronics     - hydronic distribution, manifolds, controls
#   underfloor    - underfloor / radiant heating
#   valves        - balancing / control valves, fittings
#   pumps         - circulation pumps
#
# Keep this list stable; the probe script reads it deterministically.

